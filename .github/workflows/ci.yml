name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --extra dev --python ${{ matrix.python-version }}
      - run: uv lock --check
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run python scripts/generate_schemas.py
      - run: git diff --exit-code -- docs/schemas
      - run: uv run python scripts/check_error_registry.py --check
      - run: uv run pytest
      - name: Build fixture evidence artifacts
        run: |
          uv run asimov-sim-lab evidence \
            --asset-root tests/fixtures/source_roots/minimal_valid \
            --output-dir .asimov-sim-lab/ci-evidence \
            --overwrite \
            --format json
          uv run asimov-sim-lab export \
            --asset-root tests/fixtures/source_roots/minimal_valid \
            --output-dir .asimov-sim-lab/ci-export \
            --overwrite \
            --format json
          uv run python scripts/check_release_evidence.py \
            --export-dir .asimov-sim-lab/ci-export
      - uses: actions/upload-artifact@v4
        with:
          name: evidence-python-${{ matrix.python-version }}
          path: |
            .asimov-sim-lab/ci-evidence
            .asimov-sim-lab/ci-export
          if-no-files-found: error
          retention-days: 14
      - run: uv build
      - run: uv run pip-audit --skip-editable
